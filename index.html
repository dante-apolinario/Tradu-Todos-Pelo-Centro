    <style>
        /* Modo Escuro Total e Centralização */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* O Botão Vermelho */
        .red-button {
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 220px;
            height: 220px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            text-transform: uppercase;
            outline: none;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Efeitos de Hover e Clique */
        .red-button:hover {
            background-color: #ff453a;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 59, 48, 0.6);
        }

        .red-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3);
        }

        /* Indicador do idioma atual no rodapé */
        .lang-indicator {
            position: absolute;
            bottom: 40px;
            color: #555;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
            min-height: 24px;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>

            { text: "Koto pina ki te Pokapu", lang: "rar", name: "Cook Islands Maori" },
            { text: "Kotoa ki te Loto", lang: "to", name: "Tonganês" },
            { text: "Soli taucoko ki loma", lang: "fj", name: "Fijiano" },

            { text: "Kha makh d-merkhaza", lang: "syr", name: "Siríaco" },

            { text: "Tut por l'Zentr", lang: "wa", name: "Valão" }

        const button = document.getElementById('btnCentro');
        const indicator = document.getElementById('langIndicator');

        button.addEventListener('click', () => {
            // Escolhe uma tradução aleatória da lista gigante
            const randomChoice = translations[Math.floor(Math.random() * translations.length)];
            
            // Cancela vozes tocando no momento (evita sobreposição)
            window.speechSynthesis.cancel();

            // Configura o motor de fala do navegador
            const utterance = new SpeechSynthesisUtterance(randomChoice.text);
            utterance.lang = randomChoice.lang;

            // Busca as vozes instaladas no seu dispositivo
            const voices = window.speechSynthesis.getVoices();
            
            // Tenta encontrar a voz mais próxima do idioma
            const matchingVoice = voices.find(voice => 
                voice.lang.toLowerCase() === randomChoice.lang.toLowerCase() || 
                voice.lang.toLowerCase().startsWith(randomChoice.lang.toLowerCase().split('-')[0])
            );
            
            if (matchingVoice) {
                utterance.voice = matchingVoice;
            }

            // Fala a frase!
            window.speechSynthesis.speak(utterance);

            // Mostra o idioma e o texto falado na tela
            indicator.innerHTML = `<strong>"${randomChoice.text}"</strong><br>Idioma: ${randomChoice.name} (${randomChoice.lang})`;
            indicator.style.color = '#ff3b30';
            
            // Reseta a cor de volta ao cinza sutil após 2 segundos
            setTimeout(() => {
                indicator.style.color = '#555';
            }, 2000);
        });

        // Evento crítico para carregar vozes em navegadores baseados em Chromium/Chrome
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                speechSynthesis.getVoices();
            };
        }
